<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexo</title>
<style>
  :root{
    --bg:#0a0a0d;
    --bg-elev:#131318;
    --gold:#c9a962;
    --gold-dim:#8a7440;
    --teal:#2bb8a6;
    --text:#e9e6df;
    --text-dim:#8a8a92;
    --ring:#1e1e26;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 10%, rgba(43,184,166,0.06), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(201,169,98,0.05), transparent 40%),
      var(--bg);
    color:var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height:100vh;
    padding-bottom:80px;
  }
  header{
    text-align:center;
    padding:56px 20px 36px;
  }
  header h1{
    font-size:2.4rem;
    letter-spacing:0.18em;
    font-weight:600;
    background:linear-gradient(120deg, var(--gold) 0%, #f2e2b8 45%, var(--teal) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  header .rule{
    width:80px;
    height:2px;
    margin:16px auto 0;
    background:linear-gradient(90deg, transparent, var(--gold), var(--teal), transparent);
  }
  header p{
    margin-top:14px;
    font-size:0.8rem;
    letter-spacing:0.12em;
    color:var(--text-dim);
    text-transform:uppercase;
  }

  .grid{
    max-width:1200px;
    margin:0 auto;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(120px, 1fr));
    gap:26px;
    padding:0 24px;
  }
  .card{
    aspect-ratio:1/1;
    border-radius:18px;
    overflow:hidden;
    cursor:pointer;
    background:#000;
    border:2px solid var(--ring);
    position:relative;
    transition:border-color .25s ease, transform .25s ease, box-shadow .25s ease;
  }
  .card:hover{
    border-color:var(--gold);
    transform:translateY(-4px);
    box-shadow:0 8px 24px rgba(201,169,98,0.18);
  }
  .card img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
    opacity:0;
    transition:opacity .3s ease;
  }
  .card img.loaded{ opacity:1; }
  .card::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:18px;
    box-shadow:inset 0 0 0 1px rgba(43,184,166,0.0);
    transition:box-shadow .25s ease;
  }
  .card:hover::after{
    box-shadow:inset 0 0 0 1px rgba(43,184,166,0.35);
  }

  .pager{
    max-width:1200px;
    margin:40px auto 0;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:18px;
    color:var(--text-dim);
    font-size:0.85rem;
    letter-spacing:0.06em;
  }
  .pager button{
    background:var(--bg-elev);
    border:1px solid var(--ring);
    color:var(--text);
    padding:8px 18px;
    border-radius:20px;
    cursor:pointer;
    font-size:0.8rem;
    letter-spacing:0.08em;
    transition:border-color .2s, color .2s;
  }
  .pager button:hover:not(:disabled){
    border-color:var(--gold);
    color:var(--gold);
  }
  .pager button:disabled{
    opacity:0.35;
    cursor:default;
  }

  .modal{
    position:fixed;
    inset:0;
    background:rgba(6,6,8,0.94);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:20px;
  }
  .modal.open{ display:flex; }
  .modal img{
    max-width:92vw;
    max-height:88vh;
    object-fit:contain;
    border-radius:6px;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
  }
  .modal-close{
    position:absolute;
    top:22px;
    right:28px;
    font-size:2rem;
    color:var(--text-dim);
    cursor:pointer;
    line-height:1;
    transition:color .2s;
  }
  .modal-close:hover{ color:var(--gold); }
  .modal-nav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:2.2rem;
    color:var(--text-dim);
    cursor:pointer;
    padding:12px 18px;
    user-select:none;
    transition:color .2s;
  }
  .modal-nav:hover{ color:var(--teal); }
  .modal-prev{ left:8px; }
  .modal-next{ right:8px; }

  @media (max-width:480px){
    header h1{ font-size:1.7rem; }
    .grid{ grid-template-columns:repeat(auto-fill, minmax(90px, 1fr)); gap:16px; }
    .modal-nav{ font-size:1.6rem; padding:8px 10px; }
  }
</style>
</head>
<body>

  <div class="rule"></div>

</header>

</div>

</div>

5.jpg", "FB_IMG_1783015638916.jpg", "FB_IMG_1783015640641.jpg", "FB_IMG_1783015643736.jpg", "FB_IMG_1783015645650.jpg", "FB_IMG_1783015647222.jpg", "FB_IMG_1783015651521.jpg", "FB_IMG_1783015653623.jpg", "FB_IMG_1783015655997.jpg", "FB_IMG_1783015657784.jpg", "FB_IMG_1783015660099.jpg", "FB_IMG_1783015662330.jpg", "FB_IMG_1783015663306.jpg", "FB_IMG_1783015665775.jpg", "FB_IMG_1783015667891.jpg", "FB_IMG_1783015669306.jpg", "FB_IMG_1783015674564.jpg", "FB_IMG_1783015676582.jpg", "FB_IMG_1783015677834.jpg", "FB_IMG_1783015681162.jpg", "FB_IMG_1783015681227.jpg", "FB_IMG_1783015682339.jpg", "FB_IMG_1783015684262.jpg", "FB_IMG_1783015686446.jpg", "FB_IMG_1783015688824.jpg", "FB_IMG_1783015690873.jpg", "FB_IMG_1783015693024.jpg", "FB_IMG_1783015695721.jpg", "FB_IMG_1783015697361.jpg", "FB_IMG_1783015699558.jpg", "FB_IMG_1783015700846.jpg", "FB_IMG_1783015705118.jpg", "FB_IMG_1783015707118.jpg", "FB_IMG_1783015710117.jpg", "FB_IMG_1783015712022.jpg", "FB_IMG_1783015713863.jpg", "FB_IMG_1783015716223.jpg", "Screenshot_20260701_023052.jpg"];
  const REPO_RAW = "https://raw.githubusercontent.com/InfiniteProfile/Nexo/main/";
  const PER_PAGE = 40;
  let currentPage = 0;
  let currentIndex = -1;

  const grid = document.getElementById('grid');
  const pageLabel = document.getElementById('pageLabel');
  const countLabel = document.getElementById('countLabel');
  const prevPageBtn = document.getElementById('prevPage');
  const nextPageBtn = document.getElementById('nextPage');
  const modal = document.getElementById('modal');
  const modalImg = document.getElementById('modalImg');

  const totalPages = Math.ceil(IMAGES.length / PER_PAGE);
  countLabel.textContent = IMAGES.length + " Photos";

  // Only fetch an image once its card actually scrolls into view.
  const io = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        const img = entry.target;
        img.src = img.dataset.src;
        io.unobserve(img);
      }
    });
  }, { rootMargin: '400px 0px' });

  function renderPage(page){
    currentPage = page;
    grid.innerHTML = "";
    const start = page * PER_PAGE;
    const end = Math.min(start + PER_PAGE, IMAGES.length);
    for(let i = start; i < end; i++){
      const card = document.createElement('div');
      card.className = 'card';
      const img = document.createElement('img');
      img.dataset.src = REPO_RAW + encodeURIComponent(IMAGES[i]);
      img.alt = '';
      img.addEventListener('load', () => img.classList.add('loaded'));
      card.appendChild(img);
      card.addEventListener('click', () => openModal(i));
      grid.appendChild(card);
      io.observe(img);
    }
    pageLabel.textContent = `Page ${page + 1} of ${totalPages}`;
    prevPageBtn.disabled = page === 0;
    nextPageBtn.disabled = page === totalPages - 1;
    window.scrollTo({top:0, behavior:'smooth'});
  }

  function openModal(index){
    currentIndex = index;
    modalImg.src = REPO_RAW + encodeURIComponent(IMAGES[index]);
    modal.classList.add('open');
  }
  function closeModal(){
    modal.classList.remove('open');
    modalImg.src = "";
  }
  function showNext(){
    currentIndex = (currentIndex + 1) % IMAGES.length;
    modalImg.src = REPO_RAW + encodeURIComponent(IMAGES[currentIndex]);
  }
  function showPrev(){
    currentIndex = (currentIndex - 1 + IMAGES.length) % IMAGES.length;
    modalImg.src = REPO_RAW + encodeURIComponent(IMAGES[currentIndex]);
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalNext').addEventListener('click', showNext);
  document.getElementById('modalPrev').addEventListener('click', showPrev);
  modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });
  document.addEventListener('keydown', (e) => {
    if(!modal.classList.contains('open')) return;
    if(e.key === 'Escape') closeModal();
    if(e.key === 'ArrowRight') showNext();
    if(e.key === 'ArrowLeft') showPrev();
  });

  prevPageBtn.addEventListener('click', () => { if(currentPage > 0) renderPage(currentPage - 1); });
  nextPageBtn.addEventListener('click', () => { if(currentPage < totalPages - 1) renderPage(currentPage + 1); });

  renderPage(0);
</script>
